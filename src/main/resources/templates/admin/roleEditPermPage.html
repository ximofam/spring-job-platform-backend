<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="'Phân quyền: ' + ${role.name}">Phân quyền</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  </head>
  <body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
      <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
        <div class="flex items-center">
          <a
            th:href="@{/admin/roles}"
            class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-200 text-gray-700 transition-colors mr-4"
          >
            <i class="bi bi-arrow-left text-xl"></i>
          </a>
          <div>
            <nav class="flex text-sm text-gray-400 mb-1">
              <a th:href="@{/admin/roles}" class="hover:text-gray-600 transition-colors">Roles</a>
              <span class="mx-2">/</span>
              <span class="text-gray-600">Phân quyền chi tiết</span>
            </nav>
            <h1 class="text-2xl font-bold text-gray-900">
              Vai trò:
              <span class="text-blue-600" th:text="${role.name}">Admin</span>
            </h1>
          </div>
        </div>
        <!-- Nút lưu liên kết với form bên dưới -->
        <button
          type="submit"
          form="permForm"
          class="bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-green-100 transition-all flex items-center justify-center"
        >
          <i class="bi bi-check-lg mr-2"></i>
          LƯU THAY ĐỔI
        </button>
      </div>

      <!-- Flash success -->
      <div
        th:if="${success}"
        class="mb-6 flex items-center gap-3 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl text-sm font-semibold"
      >
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${success}"></span>
      </div>

      <!-- FORM -->
      <form id="permForm" th:action="@{/admin/roles/{id}/edit(id=${role.id})}" method="post">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

          <div th:each="entry, iterStat : ${permsByModule}">
            <!-- Module header -->
            <div
              th:classappend="${!iterStat.first} ? 'border-t border-gray-100' : ''"
              class="bg-gray-50/50 px-6 py-4 flex justify-between items-center"
            >
              <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest" th:text="${entry.key}">Module</h3>
              <!-- Checkbox "chọn tất cả" module này -->
              <label class="inline-flex items-center gap-2 cursor-pointer">
                <span class="text-xs font-semibold text-blue-600">Chọn tất cả</span>
                <input
                  type="checkbox"
                  class="select-all-module w-3.5 h-3.5 accent-blue-600"
                  th:data-module="${entry.key}"
                />
              </label>
            </div>

            <!-- Permission items -->
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
              <label
                th:each="perm : ${entry.value}"
                class="flex items-center justify-between p-4 border border-gray-100 rounded-xl hover:border-blue-200 hover:bg-blue-50/30 transition-all cursor-pointer group"
              >
                <div class="flex flex-col">
                  <span
                    class="font-bold text-gray-700 group-hover:text-blue-700 transition-colors text-sm"
                    th:text="${perm.action}"
                  >
                    ACTION
                  </span>
                  <span class="text-xs text-gray-400" th:text="${perm.description} ?: ''"></span>
                </div>

                <!-- Toggle switch -->
                <div class="relative inline-block w-10 h-6 flex-shrink-0 ml-4">
                  <input
                    type="checkbox"
                    class="sr-only peer"
                    name="permissionIds"
                    th:value="${perm.id}"
                    th:data-module="${entry.key}"
                    th:checked="${selectedPermIds != null and selectedPermIds.contains(perm.id)}"
                  />
                  <div class="block w-10 h-6 bg-gray-200 rounded-full peer-checked:bg-blue-600 transition-colors"></div>
                  <div
                    class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform peer-checked:translate-x-4"
                  ></div>
                </div>
              </label>
            </div>
          </div>

          <!-- Empty state -->
          <div th:if="${#maps.isEmpty(permsByModule)}" class="py-16 text-center text-gray-400">
            <i class="bi bi-key text-5xl mb-4 block"></i>
            <p>Chưa có quyền nào được cấu hình trong hệ thống</p>
          </div>

          <!-- Footer -->
          <div class="bg-gray-50 p-6 flex justify-end gap-3 border-t border-gray-100">
            <a
              th:href="@{/admin/roles}"
              class="px-6 py-2 text-gray-500 font-semibold hover:text-gray-800 transition-colors"
            >
              Hủy bỏ
            </a>
            <button
              type="submit"
              class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold hover:bg-blue-700 transition-all"
            >
              Cập nhật ngay
            </button>
          </div>
        </div>
      </form>
    </div>

    <script>
      // Chọn tất cả theo từng module
      document.querySelectorAll(".select-all-module").forEach((selectAll) => {
        const module = selectAll.dataset.module;
        const checkboxes = () => document.querySelectorAll(`input[name="permissionIds"][data-module="${module}"]`);

        // Sync trạng thái ban đầu của chọn tất cả
        selectAll.checked = [...checkboxes()].every((c) => c.checked);

        // Khi click chọn tất cả  tick/bỏ hết trong module
        selectAll.addEventListener("change", () => {
          checkboxes().forEach((c) => (c.checked = selectAll.checked));
        });
        // Khi tick từng item  cập nhật lại chọn tất cả
        checkboxes().forEach((cb) => {
          cb.addEventListener("change", () => {
            selectAll.checked = [...checkboxes()].every((c) => c.checked);
          });
        });
      });
    </script>
  </body>
</html>
