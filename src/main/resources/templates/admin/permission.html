<html xmlns:th="http://www.thymeleaf.org"
      th:replace="admin/base :: html">

<div th:fragment="content">

<div class="max-w-[1400px] mx-auto space-y-6">
    <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-wrap gap-4 items-center">
        <div class="relative flex-1 min-w-[300px]">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" placeholder="Tìm kiếm vai trò hoặc quyền (ví dụ: Admin, JOB_POST...)" 
                class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
        </div>
        
        <div class="flex items-center space-x-2">
            <select class="bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm text-slate-600 focus:outline-none focus:border-blue-500">
                <option value="">Trạng thái: Tất cả</option>
                <option value="active">Đang hoạt động</option>
                <option value="inactive">Đã khóa</option>
            </select>
            
            <select class="bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm text-slate-600 focus:outline-none focus:border-blue-500">
                <option value="">Module: Tất cả</option>
                <option value="user">User Management</option>
                <option value="job">Recruitment</option>
                <option value="sys">System</option>
            </select>

            <button class="bg-white border border-gray-200 p-2 rounded-lg hover:bg-gray-50 text-gray-500 transition" title="Làm mới">
                <i class="fas fa-sync-alt text-sm"></i>
            </button>
        </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-6">
        <div id="role-table" class="w-full lg:w-80 shrink-0 space-y-4">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                    <h2 class="font-bold text-slate-700 text-sm">Vai trò (Roles)</h2>
                    <span class="bg-slate-200 text-slate-600 text-[10px] px-2 py-0.5 rounded-full font-bold">4</span>
                </div>
                
                <div class="p-2 space-y-1 max-h-[500px] overflow-y-auto custom-scrollbar">
                    <div th:each="role : ${roles}" 
                    class="row-item
                    flex items-center justify-between p-3 hover:bg-gray-50 rounded-lg cursor-pointer transition border border-transparent">
                        <div class="overflow-hidden">
                            <h3 class="font-bold text-blue-700 text-sm" th:text="${role.name}"></h3>
                            <p class="text-[11px] text-blue-600/70 truncate italic" th:text="'Mã: ' + ${role.id}"> </p>
                        </div>
                        <i class="fas fa-check-circle text-blue-500 text-xs"></i>
                    </div>

                    <div class="flex items-center justify-between p-3 hover:bg-gray-50 rounded-lg cursor-pointer transition border border-transparent">
                        <div class="overflow-hidden">
                            <h3 class="font-bold text-slate-700 text-sm">HR Manager</h3>
                            <p class="text-[11px] text-slate-400 truncate italic">Mã: ROLE_HR</p>
                        </div>
                    </div>

                    <div class="flex items-center justify-between p-3 hover:bg-gray-50 rounded-lg cursor-pointer transition border border-transparent">
                        <div class="overflow-hidden">
                            <h3 class="font-bold text-slate-700 text-sm">Recruiter</h3>
                            <p class="text-[11px] text-slate-400 truncate italic">Mã: ROLE_RECRUITER</p>
                        </div>
                    </div>

                    <div class="flex items-center justify-between p-3 opacity-50 grayscale bg-gray-100 rounded-lg">
                        <div class="overflow-hidden">
                            <h3 class="font-bold text-slate-700 text-sm italic text-decoration-line-through">Guest</h3>
                            <p class="text-[11px] text-slate-400">Đã khóa</p>
                        </div>
                        <i class="fas fa-lock text-[10px] text-gray-400"></i>
                    </div>
                </div>

                <button class="w-full p-3 text-xs font-bold text-blue-600 border-t border-gray-100 hover:bg-blue-50 transition">
                    <i class="fas fa-plus mr-1"></i> TẠO VAI TRÒ MỚI
                </button>
            </div>
        </div>
        <div class="flex-1">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-6 border-b border-gray-100 bg-white flex justify-between items-end">
                    <div>
                        <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded uppercase tracking-widest">Thiết lập quyền</span>
                        <h2 class="text-2xl font-black text-slate-800 mt-1 uppercase">Administrator</h2>
                    </div>
                    <div class="flex space-x-2">
                        <button class="px-4 py-2 bg-slate-800 text-white rounded-lg text-xs font-bold hover:bg-slate-700 transition shadow-lg shadow-slate-200">
                            <i class="fas fa-save mr-2"></i> LƯU THAY ĐỔI
                        </button>
                    </div>
                </div>

                <div class="p-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="border border-gray-200 rounded-xl hover:border-blue-300 transition duration-300 overflow-hidden shadow-sm hover:shadow-md">
                            <div class="bg-gray-50 px-4 py-3 flex justify-between items-center border-b border-gray-100">
                                <div class="flex items-center space-x-2">
                                    <i class="fas fa-user-circle text-slate-400"></i>
                                    <span class="text-xs font-black text-slate-700 uppercase tracking-tighter">Module: Quản lý User</span>
                                </div>
                                <input type="checkbox" checked class="w-4 h-4 accent-blue-600">
                            </div>
                            <div class="p-4 space-y-4">
                                <label class="flex items-start cursor-pointer group">
                                    <input type="checkbox" checked class="mt-1 w-4 h-4 accent-blue-600">
                                    <div class="ml-3 border-b border-transparent group-hover:border-gray-100 pb-2 w-full transition">
                                        <p class="text-sm font-bold text-slate-700 uppercase">USER_READ</p>
                                        <p class="text-[10px] text-gray-500">Xem thông tin và danh sách người dùng nội bộ.</p>
                                    </div>
                                </label>
                                <label class="flex items-start cursor-pointer group text-red-600">
                                    <input type="checkbox" class="mt-1 w-4 h-4 accent-red-500">
                                    <div class="ml-3 w-full">
                                        <p class="text-sm font-bold uppercase">USER_DELETE</p>
                                        <p class="text-[10px] opacity-70">Xóa vĩnh viễn tài khoản (Hành động rủi ro).</p>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="border border-gray-200 rounded-xl hover:border-blue-300 transition duration-300 overflow-hidden shadow-sm hover:shadow-md">
                            <div class="bg-gray-50 px-4 py-3 flex justify-between items-center border-b border-gray-100">
                                <div class="flex items-center space-x-2">
                                    <i class="fas fa-rocket text-slate-400"></i>
                                    <span class="text-xs font-black text-slate-700 uppercase tracking-tighter">Module: Tin tuyển dụng</span>
                                </div>
                                <input type="checkbox" class="w-4 h-4 accent-blue-600">
                            </div>
                            <div class="p-4 space-y-4 italic text-center text-gray-400 py-10">
                                <p class="text-xs">Chưa có quyền nào được kích hoạt cho module này.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</html>
