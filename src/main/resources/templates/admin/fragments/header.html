<header
  th:fragment="header"
  class="h-16 bg-white border-b border-gray-100 fixed top-0 right-0 left-64 z-40 flex items-center justify-between px-6">

  <div class="flex items-center gap-3 text-gray-400">
    <div class="flex items-center gap-2 text-sm">
      <span class="text-gray-700 font-medium">Quản trị hệ thống</span>
      
    </div>
  </div>

  <div class="flex items-center gap-4">
    <button
      class="flex items-center gap-2.5 group focus:outline-none"
      th:if="${currentUser != null}">

      <div class="w-7 h-7 rounded-full bg-gray-900 text-white flex items-center justify-center overflow-hidden">

        <!-- Avatar -->
        <img
          th:if="${currentUser.avatarUrl != null}"
          th:src="${currentUser.avatarUrl}"
          alt="Avatar"
          class="w-full h-full object-cover" />

        <!-- First character -->
        <span
          th:if="${currentUser.avatarUrl == null}"
          th:text="${#strings.substring(currentUser.name, 0, 1).toUpperCase()}">
          H
        </span>
      </div>

      <div class="text-left leading-none">
        <p
          class="text-xs font-medium text-gray-700 group-hover:text-gray-900"
          th:text="${currentUser.name}">
          Huy Nguyen
        </p>

        <span
          class="text-[10px] text-gray-400"
          th:text="${#strings.replace(currentUser.userRole, 'ROLE_', '')}">
          ADMIN
        </span>
      </div>

    </button>
  </div>
</header>
