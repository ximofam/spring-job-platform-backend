<header
  th:fragment="header"
  class="h-16 bg-white border-b border-gray-100 fixed top-0 right-0 left-0 md:left-64 z-40 flex items-center justify-between px-6"
>
  <div class="flex items-center gap-4 flex-1 max-w-xl">
    <button class="p-1.5 rounded hover:bg-gray-100 text-slate-500 transition-colors">
      <i data-lucide="menu" class="w-5 h-5"></i>
    </button>
    <button class="p-1.5 rounded hover:bg-gray-100 text-slate-500 hidden sm:inline-block transition-colors">
      <i data-lucide="maximize" class="w-4 h-4"></i>
    </button>
    <div class="relative w-full max-w-xs ml-2 hidden sm:block">
      <input
        type="text"
        placeholder="Search"
        class="w-full bg-slate-50 border border-transparent focus:border-indigo-500 focus:bg-white text-sm pl-4 pr-10 py-1.5 rounded-md outline-none transition-all"
      />
      <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute right-3 top-2.5"></i>
    </div>
  </div>

  <div class="flex items-center gap-4">
    <button class="p-2 text-slate-500 hover:bg-gray-50 rounded-full relative transition-colors">
      <i data-lucide="mail" class="w-5 h-5"></i>
      <span
        class="absolute top-1.5 right-1.5 w-4 h-4 bg-indigo-600 text-[10px] text-white rounded-full flex items-center justify-center font-semibold"
      >
        3
      </span>
    </button>
    <button class="p-2 text-slate-500 hover:bg-gray-50 rounded-full relative transition-colors">
      <i data-lucide="bell" class="w-5 h-5"></i>
      <span class="absolute top-2 right-2 w-2 h-2 bg-indigo-600 rounded-full"></span>
    </button>
    <div class="flex items-center gap-3 pl-2 border-l border-gray-100">
      <img
        src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80"
        alt="Avatar"
        class="w-8 h-8 rounded-full object-cover ring-2 ring-gray-100"
      />
    </div>
  </div>
</header>
