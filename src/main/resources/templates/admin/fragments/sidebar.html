<aside
  th:fragment="sidebar"
  class="w-64 bg-white border-r border-gray-100 fixed inset-y-0 left-0 z-50 flex flex-col hidden md:flex">
  <div class="h-16 flex items-center px-6 border-b border-gray-50">
    <a href="#" class="flex items-center gap-2 font-bold text-xl text-slate-800 tracking-wide uppercase">
      <i data-lucide="layers" class="w-6 h-6 text-indigo-600 fill-indigo-100"></i>
      <span>JobHub</span>
    </a>
  </div>

  <div class="flex-1 overflow-y-auto p-4 space-y-6">
    <div>
      <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider px-3 mb-2">Chính</p>
      <ul class="space-y-1">
        <li>
          <a
            th:href="@{/admin/dashboard}"
            th:classappend="${currentUri == '/admin/dashboard'} ? 'bg-indigo-50/50 text-indigo-600 font-medium' : 'text-slate-500 hover:bg-gray-50 hover:text-slate-800'"
            class="flex items-center justify-between px-3 py-2.5 rounded-lg text-sm transition-all">
            <div class="flex items-center gap-3">
              <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
              <span>Tổng Quan</span>
            </div>
          </a>
        </li>
        <li>
          <a
            th:href="@{/admin/users/employers}"
            th:classappend="${currentUri.startsWith('/admin/users')} ? 'bg-indigo-50/50 text-indigo-600 font-medium' : 'text-slate-500 hover:bg-gray-50 hover:text-slate-800'"
            class="flex items-center justify-between px-3 py-2.5 rounded-lg text-sm transition-all">
            <div class="flex items-center gap-3">
              <i data-lucide="component" class="w-4 h-4"></i>
              <span>Nhà Tuyển Dụng</span>
            </div>
            <i data-lucide="chevron-right" class="w-3 h-3 text-gray-400"></i>
          </a>
        </li>
        <li>
          <a
            th:href="@{/admin/roles}"
            th:classappend="${currentUri.startsWith('/admin/roles')} ? 'bg-indigo-50/50 text-indigo-600 font-medium' : 'text-slate-500 hover:bg-gray-50 hover:text-slate-800'"
            class="flex items-center justify-between px-3 py-2.5 rounded-lg text-sm transition-all">
            <div class="flex items-center gap-3">
              <i data-lucide="grid" class="w-4 h-4"></i>
              <span>Vai trò &amp; Quyền</span>
            </div>
            <i data-lucide="chevron-right" class="w-3 h-3 text-gray-400"></i>
          </a>
        </li>
        <li>
          <a
            th:href="@{/admin/stats/activity}"
            th:classappend="${currentUri.startsWith('/admin/stats/activity')} ? 'bg-indigo-50/50 text-indigo-600 font-medium' : 'text-slate-500 hover:bg-gray-50 hover:text-slate-800'"
            class="flex items-center justify-between px-3 py-2.5 rounded-lg text-sm transition-all">
            <div class="flex items-center gap-3">
              <i data-lucide="component" class="w-4 h-4"></i>
              <span>Thống kê Hoạt động & Vận hành</span>
            </div>
            <i data-lucide="chevron-right" class="w-3 h-3 text-gray-400"></i>
          </a>
        </li>
        <li>
          <a
            th:href="@{/admin/stats/market}"
            th:classappend="${currentUri.startsWith('/admin/stats/market')} ? 'bg-indigo-50/50 text-indigo-600 font-medium' : 'text-slate-500 hover:bg-gray-50 hover:text-slate-800'"
            class="flex items-center justify-between px-3 py-2.5 rounded-lg text-sm transition-all">
            <div class="flex items-center gap-3">
              <i data-lucide="component" class="w-4 h-4"></i>
              <span>Thống kê Thị trường & Tuyển dụng</span>
            </div>
            <i data-lucide="chevron-right" class="w-3 h-3 text-gray-400"></i>
          </a>
        </li>
        
        <li>
          <a
            th:href="@{/admin/stats/revenue}"
            th:classappend="${currentUri.startsWith('/admin/stats/revenue')} ? 'bg-indigo-50/50 text-indigo-600 font-medium' : 'text-slate-500 hover:bg-gray-50 hover:text-slate-800'"
            class="flex items-center justify-between px-3 py-2.5 rounded-lg text-sm transition-all">
            <div class="flex items-center gap-3">
              <i data-lucide="component" class="w-4 h-4"></i>
              <span>Thống Kê Doanh Thu</span>
            </div>
            <i data-lucide="chevron-right" class="w-3 h-3 text-gray-400"></i>
          </a>
        </li>
      </ul>
    </div>
  </div>
</aside>
