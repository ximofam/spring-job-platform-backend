<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh sách Roles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  </head>
  <body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
      <!-- Header -->
      <div class="flex justify-between items-end mb-8">
        <div>
          <h1 class="text-3xl font-bold text-gray-900">Cấu hình Vai trò</h1>
          <p class="text-gray-500 mt-1">Quản lý các nhóm quyền hạn trong hệ thống</p>
        </div>
        <button
          onclick="document.getElementById('createRoleModal').classList.remove('hidden')"
          class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-semibold shadow-sm transition-all flex items-center"
        >
          <i class="bi bi-plus-lg mr-2"></i>
          Tạo Role mới
        </button>
      </div>

      <!-- Flash success -->
      <div
        th:if="${success}"
        class="mb-6 flex items-center gap-3 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl text-sm font-semibold"
      >
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${success}"></span>
      </div>

      <!-- Role cards -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div
          th:each="role : ${roles}"
          class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow flex flex-col"
        >
          <div class="flex justify-between items-start mb-4">
            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-2xl">
              <i class="bi bi-shield-check"></i>
            </div>
            <div class="flex gap-x-3">
              <a
                href="#"
                th:onclick="|window.open('@{/admin/roles/{id}/update(id=${role.id})}', 'popup', 'width=800,height=600')|"
                class="text-gray-400 hover:text-blue-500"
              >
                <i class="bi bi-pencil"></i>
              </a>
              <form
                th:action="@{/admin/roles/{id}/delete(id=${role.id})}"
                method="post"
                onsubmit="return confirm('Xóa role này?');"
                style="display: inline"
              >
                <button type="submit" class="text-gray-400 hover:text-red-500 transition-colors">
                  <i class="bi bi-trash"></i>
                </button>
              </form>
            </div>
          </div>

          <h3 class="text-xl font-bold text-gray-800" th:text="${role.name}">Role Name</h3>
          <p class="text-gray-500 text-sm mt-2 mb-4 flex-1" th:text="${role.description} ?: 'Chưa có mô tả'">Mô tả</p>

          <a
            th:href="@{/admin/roles/{id}/edit(id=${role.id})}"
            class="block w-full text-center bg-gray-50 hover:bg-blue-600 hover:text-white text-gray-700 font-bold py-2.5 rounded-xl transition-all border border-gray-100"
          >
            Chỉnh sửa quyền
          </a>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(roles)}" class="col-span-3 text-center py-16 text-gray-400">
          <i class="bi bi-shield-x text-5xl mb-4 block"></i>
          <p>Chưa có vai trò nào. Hãy tạo mới!</p>
        </div>
      </div>
    </div>

    <!-- Modal tạo role mới -->
    <div id="createRoleModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
      <div
        class="absolute inset-0 bg-black/40 backdrop-blur-sm"
        onclick="document.getElementById('createRoleModal').classList.add('hidden')"
      ></div>
      <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">
        <div class="flex justify-between items-center mb-5">
          <h2 class="text-lg font-bold text-gray-800">Tạo vai trò mới</h2>
          <button
            onclick="document.getElementById('createRoleModal').classList.add('hidden')"
            class="text-gray-400 hover:text-gray-600"
          >
            <i class="bi bi-x-lg text-xl"></i>
          </button>
        </div>

        <form th:action="@{/admin/roles/create}" method="post">
          <div class="mb-4">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">
              Tên vai trò
              <span class="text-red-500">*</span>
            </label>
            <input
              type="text"
              name="name"
              required
              placeholder="VD: HR Manager"
              class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition"
            />
          </div>

          <div class="mb-6">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Mô tả</label>
            <textarea
              name="description"
              rows="3"
              placeholder="Mô tả trách nhiệm của vai trò..."
              class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition resize-none"
            ></textarea>
          </div>

          <div class="flex gap-3">
            <button
              type="button"
              onclick="document.getElementById('createRoleModal').classList.add('hidden')"
              class="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-500 font-semibold hover:bg-gray-50 transition text-sm"
            >
              Hủy
            </button>
            <button
              type="submit"
              class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition text-sm shadow-lg shadow-blue-100"
            >
              <i class="bi bi-check-lg mr-1"></i>
              Xác nhận tạo
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
