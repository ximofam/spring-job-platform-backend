<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Cập nhật: ' + ${role.name}">Cập nhật Role</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 w-full max-w-md p-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <p class="text-xs text-gray-400 uppercase tracking-widest font-bold mb-1">Chỉnh sửa vai trò</p>
            <h2 class="text-xl font-bold text-gray-800">
                <span class="text-blue-600" th:text="${role.name}">Role</span>
            </h2>
        </div>
        <button onclick="window.close()"
                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-400 transition">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    <!-- Flash success -->
    <div th:if="${success}"
         class="mb-4 flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl text-sm font-semibold">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${success}"></span>
    </div>

    <!-- Form -->
    <form th:action="@{/admin/roles/{id}/update(id=${role.id})}"
          th:object="${role}"
          method="post">

        <div class="mb-4">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">
                Tên vai trò <span class="text-red-500">*</span>
            </label>
            <input type="text"
                   th:field="*{name}"
                   required
                   class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition"/>
        </div>

        <div class="mb-6">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Mô tả</label>
            <textarea th:field="*{description}"
                      rows="4"
                      placeholder="Mô tả trách nhiệm của vai trò..."
                      class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition resize-none"></textarea>
        </div>

        <div class="flex gap-3">
            <button type="button"
                    onclick="window.close()"
                    class="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-500 font-semibold hover:bg-gray-50 transition text-sm">
                Hủy
            </button>
            <button type="submit"
                    class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition text-sm shadow-lg shadow-blue-100">
                <i class="bi bi-check-lg mr-1"></i> Lưu thay đổi
            </button>
        </div>
    </form>

</div>

<script th:if="${success}">
    if (window.opener) {
        window.opener.location.reload();
    }
    window.close();
</script>

</body>
</html>
