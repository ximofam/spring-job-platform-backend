<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{admin/base/admin_layout}">
  <div layout:fragment="content">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr
              class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-500 uppercase tracking-wider">
              <th class="px-6 py-4">Nhà tuyển dụng (User)</th>
              <th class="px-6 py-4">Doanh nghiệp (Company)</th>
              <th class="px-6 py-4">Trạng thái</th>
              <th class="px-6 py-4 text-center">Thao tác</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200 text-sm">
            <tr th:each="user : ${users}" class="hover:bg-gray-50 transition">
              <!-- User -->
              <td class="px-6 py-4 whitespace-nowrap">
                <div class="flex items-center gap-3">
                  <div
                    class="w-10 h-10 rounded-full bg-indigo-50 text-indigo-700 flex items-center justify-center font-bold text-sm border border-indigo-100">
                    <img
                      th:if="${user.avatarUrl != null}"
                      th:src="${user.avatarUrl}"
                      class="w-full h-full rounded-full object-cover" />
                    <span
                      th:if="${user.avatarUrl == null}"
                      th:text="${#strings.toUpperCase(#strings.substring(user.name, 0, 2))}"></span>
                  </div>
                  <div>
                    <div class="font-semibold text-gray-950" th:text="${user.name}"></div>
                    <div class="text-xs text-gray-500" th:text="${user.email}"></div>
                    <div class="text-[11px] text-gray-400 mt-0.5 flex items-center gap-1">
                      <i data-lucide="phone" class="w-3 h-3 text-gray-400"></i>
                      <span th:text="${user.phone ?: 'Chưa cập nhật'}"></span>
                    </div>
                  </div>
                </div>
              </td>

              <!-- Company -->
              <td class="px-6 py-4">
                <div th:if="${user.employerProfile?.company != null}" class="flex items-center gap-3">
                  <div
                    class="w-9 h-9 rounded-lg bg-white border border-gray-200 flex items-center justify-center text-gray-400 p-1 font-bold text-xs">
                    <img
                      th:if="${user.employerProfile.company.logoUrl != null}"
                      th:src="${user.employerProfile.company.logoUrl}"
                      class="w-full h-full object-contain" />
                    <span
                      th:if="${user.employerProfile.company.logoUrl == null}"
                      th:text="${#strings.toUpperCase(#strings.substring(user.employerProfile.company.name, 0, 2))}"></span>
                  </div>
                  <div class="max-w-[200px]">
                    <div
                      class="font-medium text-gray-900 truncate"
                      th:text="${user.employerProfile.company.name}"></div>
                    <div class="text-xs text-gray-700">
                      MST:
                      <span
                        class="font-mono font-medium text-gray-900"
                        th:text="${user.employerProfile.company.taxCode}"></span>
                    </div>
                  </div>
                </div>
                <span th:if="${user.employerProfile?.company == null}" class="text-gray-400 text-xs">
                  Chưa có công ty
                </span>
              </td>

              <!-- Status -->
              <td class="px-6 py-4 whitespace-nowrap">
                <!-- PENDING -->
                <span
                  th:if="${user.employerProfile?.status?.name() == 'PENDING'}"
                  class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-amber-100 text-amber-800 border border-amber-200">
                  <span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span>
                  Chờ kiểm duyệt
                </span>
                <!-- APPROVED -->
                <span
                  th:if="${user.employerProfile?.status?.name() == 'APPROVED'}"
                  class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800 border border-emerald-200">
                  <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
                  Đã duyệt
                </span>
                <!-- REJECTED -->
                <span
                  th:if="${user.employerProfile?.status?.name() == 'DENIED'}"
                  class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800 border border-red-200">
                  <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                  Từ chối
                </span>
                <!-- Chưa có profile -->
                <span th:if="${user.employerProfile == null}" class="text-gray-400 text-xs">Chưa có hồ sơ</span>
              </td>

              <!-- Actions -->
              <td class="px-6 py-4 whitespace-nowrap text-center text-xs">
                <div class="flex items-center justify-center gap-1.5">
                  <a
                    th:href="@{/admin/users/employers/{id}/edit(id=${user.id})}"
                    class="bg-white hover:bg-gray-100 border border-gray-300 text-gray-700 font-medium px-2.5 py-1.5 rounded-lg transition flex items-center gap-1">
                    <i data-lucide="pencil" class="w-3 h-3"></i>
                    Sửa
                  </a>
                  <form
                    th:if="${user.employerProfile?.status?.name() == 'PENDING'}"
                    th:action="@{/admin/users/employers/{id}/approve(id=${user.id})}"
                    method="post">
                    <button
                      type="submit"
                      class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-2.5 py-1.5 rounded-lg shadow-sm transition flex items-center gap-1">
                      <i data-lucide="check" class="w-3 h-3"></i>
                      Duyệt
                    </button>
                  </form>

                  <!-- Từ chối -->
                  <form
                    th:if="${user.employerProfile?.status?.name() == 'PENDING'}"
                    th:action="@{/admin/users/employers/{id}/reject(id=${user.id})}"
                    method="post">
                    <button
                      type="submit"
                      class="bg-white hover:bg-gray-100 border border-gray-300 text-gray-700 font-medium px-2.5 py-1.5 rounded-lg transition">
                      Từ chối
                    </button>
                  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div
        class="bg-white px-6 py-4 border-t border-gray-200 flex flex-col sm:flex-row items-center justify-between gap-3">
        <div class="text-xs sm:text-sm text-gray-500">
          Hiển thị
          <span class="font-semibold text-gray-900" th:text="${users.size()}"></span>
          hồ sơ
        </div>
      </div>
    </div>
  </div>
</html>
