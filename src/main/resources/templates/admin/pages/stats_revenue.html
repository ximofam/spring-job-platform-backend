<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{admin/base/admin_layout}">
  <div layout:fragment="content">
    <div class="flex h-screen overflow-hidden">
      <div class="flex-1 flex flex-col overflow-y-auto">
        <!-- Filter Bar -->
        <form th:action="@{/admin/stats/revenue}" method="get" class="flex flex-wrap items-center gap-3">
          <div class="flex items-center gap-2 bg-white border border-gray-200 rounded-xl px-4 py-2 shadow-xs">
            <i data-lucide="calendar-days" class="w-4 h-4 text-gray-400"></i>
            <span class="text-xs text-gray-400 font-medium uppercase tracking-wider mr-1">Giai đoạn</span>
            <select
              name="period"
              onchange="this.form.submit()"
              class="text-xs font-semibold text-gray-700 bg-transparent outline-none cursor-pointer">
              <option value="MONTH" th:selected="${currentPeriod.name() == 'MONTH'}">Tháng</option>
              <option value="QUARTER" th:selected="${currentPeriod.name() == 'QUARTER'}">Quý</option>
              <option value="YEAR" th:selected="${currentPeriod.name() == 'YEAR'}">Năm</option>
            </select>
          </div>

          <div class="flex items-center gap-2 bg-white border border-gray-200 rounded-xl px-4 py-2 shadow-xs">
            <i data-lucide="calendar" class="w-4 h-4 text-gray-400"></i>
            <span class="text-xs text-gray-400 font-medium uppercase tracking-wider mr-1">Năm</span>
            <select
              name="year"
              onchange="this.form.submit()"
              class="text-xs font-semibold text-gray-700 bg-transparent outline-none cursor-pointer">
              <option value="2024" th:selected="${currentYear == 2024}">2024</option>
              <option value="2025" th:selected="${currentYear == 2025}">2025</option>
              <option value="2026" th:selected="${currentYear == 2026}">2026</option>
            </select>
          </div>

          <div class="ml-auto text-xs font-medium text-gray-500">
            <span th:text="${currentPeriod.name() + ' · ' + currentYear}"></span>
          </div>
        </form>
        <div class="p-6 space-y-6 max-w-7xl w-full mx-auto">
          <!-- Chart 1: Xu hướng doanh thu -->
          <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-xs">
            <div class="mb-4">
              <h4 class="font-bold text-gray-900">Xu Hướng Doanh Thu</h4>
              <p class="text-xs text-gray-400">Tổng hợp amount các giao dịch thành công (COMPLETED)</p>
            </div>
            <div class="h-72">
              <canvas id="chartRevenueTrend"></canvas>
            </div>
          </div>

          <!-- Chart 2 + Bảng: Top công ty -->
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-xs lg:col-span-2">
              <div class="mb-4">
                <h4 class="font-bold text-gray-900">
                  <i class="fa-solid fa-crown text-amber-500"></i>
                  Top Doanh Nghiệp Chi Tiêu Nhiều Nhất
                </h4>
                <p class="text-xs text-gray-400">Tổng doanh thu từ các giao dịch COMPLETED</p>
              </div>
              <div class="h-72">
                <canvas id="chartTopCompanies"></canvas>
              </div>
            </div>

            <!-- Bảng chi tiết -->
            <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-xs">
              <div class="mb-4">
                <h4 class="font-bold text-gray-900">Chi Tiết</h4>
                <p class="text-xs text-gray-400">Top 5 doanh nghiệp</p>
              </div>
              <div class="space-y-3">
                <div th:each="company, stat : ${topCompanies}" class="flex items-center justify-between">
                  <div class="flex items-center gap-2">
                    <div
                      class="w-7 h-7 rounded-md bg-indigo-50 flex items-center justify-center text-xs font-bold text-indigo-700"
                      th:text="${stat.index + 1}"></div>
                    <span class="text-sm font-medium text-gray-700" th:text="${company['companyName']}"></span>
                  </div>
                  <span
                    class="text-sm font-bold text-gray-900"
                    th:text="${#numbers.formatInteger(company['revenue'], 0, 'COMMA') + 'đ'}"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <th:block layout:fragment="scripts">
    <script th:inline="javascript">
      const revenueData  = [[${revenueData}]];
      const topCompanies = [[${topCompanies}]];

      // Chart 1: Line — xu hướng doanh thu
      new Chart(document.getElementById('chartRevenueTrend').getContext('2d'), {
        type: 'line',
        data: {
          labels: revenueData.labels,
          datasets: [{
            label: 'Doanh thu (VND)',
            data: revenueData.data,
            borderColor: '#10b981',
            backgroundColor: 'rgba(16,185,129,0.05)',
            fill: true,
            tension: 0.2,
            borderWidth: 3,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: '#f3f4f6' },
              ticks: { callback: (val) => val.toLocaleString('vi-VN') + 'đ' }
            },
            x: { grid: { display: false } }
          }
        }
      });

      // Chart 2: Bar ngang — top công ty
      new Chart(document.getElementById('chartTopCompanies').getContext('2d'), {
        type: 'bar',
        data: {
          labels: topCompanies.map(c => c.companyName),
          datasets: [{
            label: 'Tổng chi tiêu (VND)',
            data: topCompanies.map(c => c.revenue),
            backgroundColor: ['#4f46e5', '#7c3aed', '#2563eb', '#0891b2', '#059669'],
            borderRadius: 4,
          }],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { color: '#f3f4f6' },
              ticks: { callback: (val) => val.toLocaleString('vi-VN') + 'đ' }
            },
            y: { grid: { display: false } }
          }
        }
      });
    </script>
  </th:block>
</html>
