services:
  postgres-db:
    image: postgres:16-alpine
    container_name: job_platform_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.4.0-alpine
    container_name: job-platform-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data


  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: stripe-cli-webhook
    command: "listen --forward-to host.docker.internal:8080/job-platform-backend/api/payments/webhook/stripe"
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}

volumes:
  postgres_data:
  redis_data: