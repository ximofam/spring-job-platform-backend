services:
  postgres-db:
    image: pgvector/pgvector:pg16
    container_name: job_platform_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.4.0-alpine
    container_name: job-platform-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data


  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: stripe-cli-webhook
    command: "listen --forward-to host.docker.internal:8080/job-platform-backend/api/payments/webhook/stripe"
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}

  embed-service:
    image: ximofam/embed-service:latest
    ports:
      - "${EMBED_PORT}:${EMBED_PORT}"
    environment:
      HOST: "${EMBED_HOST}"
      PORT: "${EMBED_PORT}"
      API_KEY: "${EMBED_API_KEY}"
      HF_TOKEN: "${EMBED_HF_TOKEN}"
      HF_MODEL: "${EMBED_HF_MODEL}"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${EMBED_PORT}/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data: